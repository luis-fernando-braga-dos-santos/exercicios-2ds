<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>

    <h1>Formulário de Inscrição</h1>

    <form>

        <label>Nome:</label>
        <input type="text">
        <br><br>

        <label>Email:</label>
        <input type="email">
        <br><br>

        <label>Senha:</label>
        <input type="password">
        <br><br>

        <label>Disciplina:</label>
        <select>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
        </select>
        <br><br>

        <label>Mensagem:</label>
        <br>
        <textarea></textarea>
        <br><br>

        <input type="submit" value="Cadastrar">

    </form>

</body>
</html>
