<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tech Academy</title>
</head>
<body>

    <h1>Sistema de Cadastro de Alunos</h1>

    <h2>Cadastro</h2>

    <form>
        <label>Nome:</label><br>
        <input type="text"><br><br>

        <label>Email:</label><br>
        <input type="email"><br><br>

        <label>Idade:</label><br>
        <input type="number"><br><br>

        <label>Curso:</label><br>
        <select>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
        </select><br><br>

        <label>Observações:</label><br>
        <textarea></textarea><br><br>

        <input type="submit" value="Cadastrar">
    </form>

    <hr>

    <h2>Alunos Matriculados</h2>

    <table>
        <caption>Lista de Alunos</caption>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Curso</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ana</td>
                <td>ana@email.com</td>
                <td>HTML</td>
            </tr>
            <tr>
                <td>Bruno</td>
                <td>bruno@email.com</td>
                <td>CSS</td>
            </tr>
            <tr>
                <td>Carla</td>
                <td>carla@email.com</td>
                <td>JavaScript</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
